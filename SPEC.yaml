        then: "the fitted gameplay rectangle stays fully inside the host bounds without overflow"
  - id: PRT-002
    description: "The private prototype asset manifest exposes repo-tracked replacement textures and audio for Stage 1 while preserving fallback-compatible behavior outside the mandatory opening slice."
    priority: high
