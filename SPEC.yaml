        then: "each player slot exposes score, lives, bombs, weapons, and life-state values without mutating simulation"
      - name: "hud projection surfaces boss health and continue countdowns"
        given: "a simulation snapshot with an active boss and a continue-pending player"
        when: "the hud projection is derived"
        then: "the boss health ratio and per-player continue countdowns are available to the DOM overlay"
  - id: AST-001
    description: "The browser shell owns a base-path-safe asset manifest that separates shell, shared gameplay, and per-stage bundle metadata."
    priority: high
    scenarios:
      - name: "asset manifest resolves shell shared and stage bundles"
