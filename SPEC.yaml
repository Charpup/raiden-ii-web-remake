  - id: RNT-001
    description: "The browser runtime wires the fixed-step clock, captured inputs, simulation, renderer, HUD, and audio playback into a playable shell."
    priority: high
    scenarios:
      - name: "browser shell mount creates gameplay and overlay surfaces"
        given: "the app root element"
        when: "the browser shell mounts"
        then: "a gameplay viewport, HUD layer, and overlay layer exist"
      - name: "browser runtime tick advances simulation and read-only projections"
        given: "the browser shell has entered gameplay"
        when: "host delta time is ticked through the runtime"
        then: "the clock emits simulation steps and the scene, HUD, and audio projections update from the new snapshot"
  - id: RNT-201R
    description: "Stage 1 gameplay startup passes through an explicit asset-loading gate and only enters gameplay after the required replacement asset set is ready."
    priority: high
    scenarios:
      - name: "title to gameplay enters asset-loading before stage 1 starts"
        given: "the browser shell at title state with a valid stage 1 replacement asset set"
        when: "the player selects 1P Solo and Easy Cabinet"
