specification:
  name: "Raiden II Private Prototype Runtime and Stage 1 Replacement Systems"
  version: "0.4.0"
  description: "Deterministic runtime, authored stage systems, and a desktop-first browser shell for a private playable Stage 1 prototype."

roadmap_context:
  current_track: "stage1-private-playable-prototype"
  current_milestone: "1P Solo + Easy Stage 1 boss-clear vertical slice"
  active_high_level_sprints:
    - "combat-readability"
    - "replacement-asset-pack"
    - "boss-clear-slice"
    - "prototype-hardening"
  archived_requirement_families:
    - "REL-*"
    - "DEP-*"
    - "AST-401"
  note: "The release/deployment requirement families remain in this spec as historical implementation evidence from the previous public-release track. They are not the active planning target for the next sprint cycle."

tdd_config:
  test_framework: vitest
  coverage_threshold: 80
  test_types:
    - unit
    - integration

requirements:
  - id: SIM-001
    description: "The runtime advances deterministic fixed-step frames at 60 Hz regardless of variable host delta input."
    priority: high
    scenarios:
      - name: "fixed-step accumulator emits exact frame count"
        given: "a new clock and a host delta larger than one frame"
        when: "the clock ticks with 50 milliseconds"
        then: "it emits exactly three 60 Hz simulation steps and preserves sub-frame remainder"
      - name: "paused clock suppresses steps"
        given: "a paused clock"
        when: "it receives host delta"
        then: "it emits zero simulation steps"
  - id: SIM-002
    description: "The runtime can pause, resume, and clamp large host deltas after background throttling."
    priority: high
    scenarios:
      - name: "background spike is clamped"
        given: "a running clock with a maximum delta clamp"
        when: "the host delta exceeds the clamp threshold"
        then: "the consumed delta is capped before frame accumulation"
      - name: "resume continues from previous remainder"
        given: "a paused clock with stored remainder"
        when: "it resumes and receives a normal host delta"
        then: "the previously stored remainder contributes to the next fixed-step output"
  - id: INP-001
    description: "The runtime maps keyboard and gamepad input into independent 1P and 2P frame input snapshots."
    priority: high
    scenarios:
      - name: "keyboard mapping yields independent player controls"
        given: "default 1P and 2P keyboard bindings"
        when: "key sets for both players are pressed in the same frame"
        then: "each player snapshot reflects only its own configured actions"
      - name: "gamepad binding can target a specific player slot"
        given: "a gamepad state assigned to player two"
        when: "it reports analog movement and fire input"
        then: "player two receives normalized movement and action state while player one remains unchanged"
  - id: REN-001
    description: "The renderer synchronizes visual state from simulation snapshots without mutating game rules."
    priority: high
    scenarios:
      - name: "renderer mirrors simulation entities"
        given: "a simulation snapshot with players and enemies"
        when: "the renderer syncs"
        then: "it returns a presentational scene graph model that matches positions and animation intents"
      - name: "renderer does not mutate simulation state"
        given: "an immutable simulation snapshot"
        when: "renderer sync is called"
        then: "the original simulation snapshot remains unchanged"
  - id: AUD-001
    description: "The audio director derives BGM and SFX cues from simulation state transitions rather than owning game rules."
    priority: high
    scenarios:
      - name: "bgm cue changes with stage state"
        given: "a simulation snapshot entering a new stage"
        when: "audio sync runs"
        then: "it emits a BGM cue for that stage"
      - name: "sfx cues are edge-triggered"
        given: "two consecutive snapshots where only the first contains a new fire event"
        when: "audio sync runs over both snapshots"
        then: "the fire cue is emitted only once"
  - id: PLY-001
    description: "The combat core advances player movement with normalized directional input, focus-speed handling, and a stable hitbox."
    priority: high
    scenarios:
      - name: "diagonal movement is normalized"
        given: "a player with standard movement speed"
        when: "the player moves diagonally in one frame"
        then: "the resulting displacement is normalized and does not exceed straight-line speed"
      - name: "focused movement uses slower speed"
        given: "a player with focus held"
        when: "the player moves horizontally"
        then: "the resulting displacement uses the focus movement multiplier"
  - id: WPN-001
    description: "Main weapon pickups level the active main weapon or switch to a new route at base level."
    priority: high
    scenarios:
      - name: "same-color pickup increases level"
        given: "a player holding a main weapon route"
        when: "the same route pickup is collected"
        then: "the main weapon level increases and respects the maximum cap"
      - name: "different-color pickup switches route"
        given: "a player holding one main weapon route"
        when: "a different route pickup is collected"
        then: "the player switches to that route at level one"
  - id: WPN-002
    description: "Sub-weapon pickups level or switch the current missile route independently from the main weapon."
    priority: high
    scenarios:
      - name: "same sub-weapon pickup increases level"
        given: "a player with a sub-weapon"
        when: "the same sub-weapon pickup is collected"
        then: "its level increases and respects the maximum cap"
      - name: "different sub-weapon pickup switches route"
        given: "a player with one sub-weapon route"
        when: "a different sub-weapon pickup is collected"
        then: "the sub-weapon route switches to the new one at level one"
  - id: BMB-001
    description: "Bomb activation consumes stock, clears active bullets, and grants a temporary invulnerability window."
    priority: high
    scenarios:
      - name: "bomb clears bullets when stock exists"
        given: "a player with at least one bomb and active enemy bullets"
        when: "bomb activation occurs"
        then: "bomb stock decreases, bullets are cleared, and invulnerability begins"
      - name: "bomb does nothing when no stock remains"
        given: "a player with zero bombs"
        when: "bomb activation occurs"
        then: "state remains unchanged and no clear effect occurs"
  - id: DMG-001
    description: "Damage applies invulnerability gating, life loss, downgrade rules, and checkpoint respawn state."
    priority: high
    scenarios:
      - name: "damage respawns player from checkpoint with downgraded gear"
        given: "a vulnerable player with reserve lives and upgraded weapons"
        when: "the player takes fatal damage"
        then: "the player respawns at the checkpoint with reserve life spent, temporary invulnerability, and downgraded weapon levels"
      - name: "invulnerable player ignores damage"
        given: "a player inside an invulnerability window"
        when: "damage is applied"
        then: "lives and gear remain unchanged"
  - id: SCR-001
    description: "Score and medal rules award points, advance medal value, and grant extends at configured thresholds."
    priority: high
    scenarios:
      - name: "medals increase score and medal tier"
        given: "a player collecting medals in sequence"
        when: "two medals are collected"
        then: "score increases by the configured medal values and the medal tier advances"
      - name: "crossing an extend threshold grants one reserve life"
        given: "a player just below an extend threshold"
        when: "points are awarded past the threshold"
        then: "exactly one extend is granted for that threshold crossing"
  - id: SIM-003
    description: "The simulation owns gameplay runtime state for session, players, enemies, pickups, boss progress, and stage cursors."
    priority: high
    scenarios:
      - name: "simulation initializes session-owned runtime state"
        given: "a new simulation with an explicit session config"
        when: "its initial state is queried"
        then: "the returned snapshot contains the configured session, runtime players, and empty encounter state"
      - name: "co-op mode initializes two player runtime models"
        given: "a simulation configured for co-op play"
        when: "its initial state is queried"
        then: "two independent runtime players are present in the same simulation snapshot"
  - id: SIM-004
    description: "Simulation.step consumes frame input and produces end-to-end gameplay state transitions without delegating rules to renderer or audio layers."
    priority: high
    scenarios:
      - name: "step applies player movement and fire input"
        given: "a running simulation and a player input snapshot"
        when: "the simulation steps one frame"
        then: "player position updates and a fire event is emitted from simulation state"
      - name: "inactive players ignore gameplay input"
        given: "a player that has already been destroyed and marked inactive"
        when: "movement fire and bomb input are supplied on a later frame"
        then: "the inactive player does not move and emits no gameplay events"
      - name: "step keeps renderer and audio as read-only projections"
        given: "a simulation snapshot after gameplay updates"
        when: "renderer and audio sync are called"
        then: "they derive presentation cues without mutating the simulation snapshot"
  - id: STG-001
    description: "The stage runner advances scroll state and emits scripted wave spawns from data-driven stage definitions."
    priority: high
    scenarios:
      - name: "scroll-driven wave trigger spawns configured enemies"
        given: "a stage definition with a wave waiting on scroll progress"
        when: "simulation advances past the trigger point"
        then: "the configured enemies are instantiated and a wave-spawned event is emitted"
      - name: "checkpoint trigger arms the current respawn cursor"
        given: "a stage definition with checkpoint thresholds"
        when: "simulation scroll reaches a checkpoint threshold"
        then: "the active checkpoint cursor updates and a checkpoint-armed event is emitted"
  - id: STG-002
    description: "Checkpoint recovery restores player position and stage cursor state after fatal damage."
    priority: high
    scenarios:
      - name: "fatal damage respawns at armed checkpoint"
        given: "a player with reserve lives and an armed checkpoint"
        when: "fatal damage is applied"
        then: "the player respawns at the checkpoint position and stage cursor state is restored"
      - name: "checkpoint restoration preserves scripted wave cursor"
        given: "a stage already progressed beyond earlier content"
        when: "the player respawns from the current checkpoint"
        then: "the stage retains the armed checkpoint wave cursor instead of resetting to the beginning"
      - name: "checkpoint restoration keeps one-time hidden state consumed"
        given: "a hidden trigger already consumed before a checkpoint respawn"
        when: "the player respawns and the trigger condition becomes true again"
        then: "the hidden reward does not spawn a second time"
  - id: BOS-001
    description: "Boss encounters are expressed through explicit data-driven phase state and clear conditions."
    priority: high
    scenarios:
      - name: "boss phase changes when health crosses configured threshold"
        given: "an active boss with multiple phases"
        when: "its health is reduced beyond a phase threshold"
        then: "the boss phase changes and a boss-phase-changed event is emitted"
      - name: "defeating the boss clears the stage"
        given: "an active boss at zero health"
        when: "the next simulation frame resolves boss state"
        then: "the stage is marked complete and a stage-cleared event is emitted"
  - id: HID-001
    description: "Hidden triggers are evaluated from stage data, reward the player once, and cannot double-award."
    priority: high
    scenarios:
      - name: "hidden trigger spawns configured reward once"
        given: "a hidden trigger tied to stage conditions"
        when: "the trigger condition becomes true"
        then: "one reward pickup is created and a hidden-triggered event is emitted"
      - name: "hidden trigger cannot fire twice"
        given: "a hidden trigger already marked as triggered"
        when: "its source condition becomes true again"
        then: "no second reward is created"
  - id: CAB-001
    description: "Cabinet difficulty differences are expressed through data-only tuning and do not fork gameplay code paths."
    priority: high
    scenarios:
      - name: "hard cabinet increases encounter health from data"
        given: "the same stage loaded under easy and hard cabinet profiles"
        when: "the first scripted enemy wave spawns"
        then: "the hard profile enemy health is higher than the easy profile health"
  - id: COOP-001
    description: "A single simulation supports 1P and 2P local cooperative lifecycle rules."
    priority: high
    scenarios:
      - name: "co-op simulation updates both players from one frame input"
        given: "a co-op session with independent player inputs"
        when: "the simulation steps"
        then: "both player runtime states update within the same simulation snapshot"
  - id: LOP-001
    description: "Loop progression advances through stage data and applies difficulty carryover in simulation state."
    priority: high
    scenarios:
      - name: "final stage clear advances loop index"
        given: "a loop-ending stage definition and a defeated final boss"
        when: "the simulation resolves stage clear"
        then: "the session loop index increments and a loop-advanced event is emitted"
  - id: STG-101
    description: "Stage 1 is authored as a locked golden slice with a stable macro route, staggered wave cadence, and a pre-boss resource stretch."
    priority: high
    scenarios:
      - name: "stage 1 definition exposes the golden-route beats"
        given: "the authored stage 1 definition"
        when: "its wave list is inspected"
        then: "the route is organized into the opening farms, first cache, swamp pressure, crater, fairy-tree recovery, and pre-boss medal-cache beats"
      - name: "opening scoutcraft wave staggers entries within one authored wave"
        given: "the stage 1 opening wave"
        when: "the simulation advances through the first few frames after that wave triggers"
        then: "the scoutcraft do not all spawn on the same frame and their authored cadence is preserved"
  - id: STG-102
    description: "Stage 1 checkpoint recovery restores the player to the crater-exit checkpoint and preserves the intended post-checkpoint route."
    priority: high
    scenarios:
      - name: "crater-exit checkpoint is armed before the fairy route"
        given: "stage 1 has advanced into the crater section"
        when: "the checkpoint threshold is crossed"
        then: "the crater-exit checkpoint becomes the armed respawn target"
      - name: "death after the crater exits respawns into the late-stage route"
        given: "the crater-exit checkpoint is armed"
        when: "the player loses a life in single-player mode"
        then: "the player respawns at the crater-exit checkpoint with the later stage cursor restored"
  - id: HID-101
    description: "Stage 1 hidden routes include the post-crater fairy tree and the pre-boss cache reward, and both remain one-shot rewards."
    priority: high
    scenarios:
      - name: "destroying the fairy tree reveals a fairy reward"
        given: "the player reaches the post-crater hidden tree in stage 1"
        when: "that hidden target is destroyed"
        then: "a fairy reward appears exactly once"
      - name: "finding the fairy seeds checkpoint recovery drops"
        given: "the stage 1 fairy route has already been triggered before a checkpoint death"
        when: "the player respawns from the crater-exit checkpoint"
        then: "the checkpoint restart emits recovery pickups without retriggering the fairy hidden target"
      - name: "hard cabinet medal cache upgrades to a Miclus reward"
        given: "the player destroys the pre-boss cache trigger in stage 1"
        when: "the session uses the hard cabinet profile"
        then: "the authored hidden reward resolves to a Miclus rather than the easy-cabinet fallback"
  - id: BOS-101
    description: "Stage 1 culminates in a multi-phase Death Walkers encounter with authored phase names and pattern labels."
    priority: high
    scenarios:
      - name: "the stage 1 boss starts with the paired-walker opening pattern"
        given: "all stage 1 waves are cleared and the boss encounter starts"
        when: "the first boss frame resolves"
        then: "the boss enters the paired-walker opening phase with its authored pattern label"
      - name: "the stage 1 boss exposes two independently damageable walkers"
        given: "the Death Walkers encounter is active"
        when: "one walker is destroyed before the other"
        then: "the surviving walker remains active and stage clear waits until both walkers are defeated"
      - name: "the boss advances through the rotary combo and desperation phases before clear"
        given: "the stage 1 boss is active"
        when: "its health crosses the authored thresholds"
        then: "the boss phase ladder follows opening, rotary combo, desperation, and then stage clear"
  - id: AUTH-101
    description: "Stage 1 authoring data carries the metadata needed for future full-content authoring without moving rules into renderer or audio."
    priority: high
    scenarios:
      - name: "stage 1 wave spawns can express delayed cadence and behavior labels"
        given: "the authored stage 1 wave and spawn data"
        when: "the opening scoutcraft beat is inspected"
        then: "spawn cadence offsets and behavior labels are present in the authoring layer"
      - name: "stage 1 boss phases expose authored pattern labels"
        given: "the authored stage 1 boss definition"
        when: "its phases are inspected"
        then: "each phase includes a stable pattern label for later behavior implementation"
  - id: STG-201
    description: "Stage 2 is authored as a macro-locked golden route covering suburb streets, canal pressure, amphibious tank setpiece, base entrance, and the Albatross finale."
    priority: high
    scenarios:
      - name: "stage 2 definition exposes the authored macro route"
        given: "the authored stage 2 definition"
        when: "its wave list is inspected"
        then: "the route is organized into suburb approach, canal gunboats, amphibious pair, base entrance, return-to-town pressure, and the hard-only late-car beat"
      - name: "stage 2 can progress from authored waves into the boss encounter"
        given: "a stage 2 simulation"
        when: "the authored waves are cleared in order"
        then: "the Albatross encounter starts from data without any stage-specific simulation branch"
  - id: STG-202
    description: "Stage 3 is authored as a harbor-to-open-water route with a scripted 1UP crush route, a Miclus platform route, and the Battle Axe finale."
    priority: high
    scenarios:
      - name: "stage 3 definition exposes the harbor, sea, and war-barge beats"
        given: "the authored stage 3 definition"
        when: "its wave list is inspected"
        then: "the route includes the opening crusher tanks, harbor pressure, open-water segment, dual-platform route, and war-barge approach"
      - name: "stage 3 special routes stay data-driven"
        given: "the authored stage 3 hidden trigger set"
        when: "the silver crate and right platform routes are inspected"
        then: "the 1UP crush route and Miclus route are expressed as authored triggers rather than hard-coded stage logic"
  - id: STG-203
    description: "Stage 4 is authored as a forest-to-fortress route with a chained fairy reveal route, late kamikaze rush, and the Thunder Fortress finale."
    priority: high
    scenarios:
      - name: "stage 4 definition exposes the forest, ruins, lake defense, platform, and tower beats"
        given: "the authored stage 4 definition"
        when: "its wave list is inspected"
        then: "the route includes the ring-defense targets, first platform, third-platform kamikaze rush, and twin-tower approach without making the hidden fairy route a required wave gate"
      - name: "stage 4 chained hidden route stays in the authoring layer"
        given: "the authored stage 4 wave and hidden trigger data"
        when: "the ring targets and revealed bush route are inspected"
        then: "the fairy path is expressed through authored hidden-trigger conditions and reveal content rather than a simulation-side special case"
  - id: CHK-201
    description: "Stages 2 through 4 expose coarse checkpoint recovery anchors that preserve late-route progress without resetting to the beginning."
    priority: medium
    scenarios:
      - name: "stage 2 arms a late-route checkpoint after the amphibious setpiece"
        given: "a stage 2 simulation"
        when: "scroll advances through the base-return segment"
        then: "a late-route checkpoint becomes the active respawn anchor"
      - name: "stage 3 and stage 4 checkpoint definitions remain data-driven"
        given: "the authored stage 3 and stage 4 definitions"
        when: "their checkpoint lists are inspected"
        then: "each stage exposes at least one explicit checkpoint definition for future capture refinement"
  - id: HID-201
    description: "Stages 2 through 4 express their special routes through data, including source-aware rewards and chained reveal routes."
    priority: high
    scenarios:
      - name: "stage 3 extend route only rewards when the silver crate is crushed by the second tank"
        given: "the stage 3 opening silver crate route"
        when: "the silver crate is destroyed by the authored crusher tank rather than the player"
        then: "an extend reward appears exactly once"
      - name: "stage 4 ring targets reveal the bush before the fairy reward"
        given: "the stage 4 lake defense route"
        when: "all eight ring targets are destroyed and the revealed bush is then destroyed"
        then: "the bush appears first as a non-blocking hidden reveal and the fairy reward appears only after the bush is destroyed"
  - id: BOS-201
    description: "Stages 2 through 4 culminate in authored boss encounters with named phase ladders and multipart structure where needed."
    priority: high
    scenarios:
      - name: "Albatross advances through authored missile and desperation phases"
        given: "the stage 2 boss encounter"
        when: "its health crosses the authored thresholds"
        then: "the boss phase ladder follows opening, hornet missile pressure, and desperation"
      - name: "Battle Axe advances through pop-up battery and exposed-core phases"
        given: "the stage 3 boss encounter"
        when: "its health crosses the authored thresholds"
        then: "the boss phase ladder follows pop-up battery, broadside pressure, and exposed core"
      - name: "Thunder Fortress exposes defensive structures before the core phase"
        given: "the stage 4 boss encounter"
        when: "its health crosses the authored thresholds"
        then: "the boss phase ladder follows barricade opening, tower battery, and core storm"
  - id: AUTH-201
    description: "Stage 2 through 4 authoring data extends the Stage 1 model with only the minimal new trigger metadata needed for special-route fidelity."
    priority: high
    scenarios:
      - name: "hidden routes can reveal authored enemies after grouped target clears"
        given: "a stage definition with a hidden reveal gated on multiple destroyed targets"
        when: "the authoring data is inspected"
        then: "the hidden trigger can express all-target-destroyed gating and reveal authored enemies in data"
      - name: "hidden routes can require a specific authored destroy source"
        given: "a hidden trigger for the stage 3 crusher-tank route"
        when: "the authoring data is inspected"
        then: "the trigger can require the authored source enemy that caused the destruction"
  - id: STG-301
    description: "Stage 5 is authored as a locked macro route covering the ground-base advance, rail-tank gauntlet, bomber corridor, refinery crossfire, late armor surge, and the Black Bird finale."
    priority: high
    scenarios:
      - name: "stage 5 definition exposes the authored macro route"
        given: "the authored stage 5 definition"
        when: "its wave list is inspected"
        then: "the route includes the ground-base advance, rail-tank gauntlet, bomber corridor, refinery crossfire, late armor surge, and a pre-boss cache stretch"
      - name: "stage 5 can progress from the authored route into Black Bird"
        given: "a stage 5 simulation"
        when: "the authored waves are cleared in order"
        then: "the Black Bird encounter starts from data without stage-specific simulation branches"
  - id: STG-302
    description: "Stage 6 is authored as a launch-to-crystal route with a red-crystal escape special route and a named Graphite phase ladder."
    priority: high
    scenarios:
      - name: "stage 6 definition exposes the authored macro route"
        given: "the authored stage 6 definition"
        when: "its wave list is inspected"
        then: "the route includes the launch scramble, crystal corridor, asteroid ambush, defense array, red crystal escape, and reactor approach beats"
      - name: "stage 6 special route stays data-driven"
        given: "the authored stage 6 hidden trigger set"
        when: "the red crystal route is inspected"
        then: "the extend route is expressed through a timed hidden trigger rather than a simulation-side special case"
  - id: STG-303
    description: "Stage 7 is authored as a battleship-to-satellite route with an optional rocket-cache hidden reveal and the Huge Satellite finale."
    priority: high
    scenarios:
      - name: "stage 7 definition exposes the authored macro route"
        given: "the authored stage 7 definition"
        when: "its wave list is inspected"
        then: "the route includes the battleship deck, meteor scramble, nuclear rocket battery, artillery corridor, and launch apron beats"
      - name: "optional hidden routes do not gate stage 7 progression"
        given: "a stage 7 simulation"
        when: "the rocket-cache hidden route is ignored"
        then: "the mainline still advances into the Huge Satellite encounter"
  - id: STG-304
    description: "Stage 8 replaces the loop-validation scaffold with a final-stage macro route covering the alien surface, roaming crystal chase, facility crossfire, pre-boss Miclus route, and Mother Haven finale."
    priority: high
    scenarios:
      - name: "stage 8 definition no longer uses the provisional scaffold"
        given: "the authored stage 8 definition"
        when: "its wave list is inspected"
        then: "it exposes the alien surface, roaming crystal chase, facility crossfire, pre-boss Miclus line, and final approach beats"
      - name: "stage 8 still advances into loop carryover after Mother Haven"
        given: "a stage 8 simulation"
        when: "the final boss is defeated"
        then: "the loop carryover still returns the session to stage 1"
  - id: CHK-301
    description: "Stages 5 through 8 expose coarse late-route checkpoints that avoid mid-staggered-wave restores while preserving the authored late-stage route."
    priority: medium
    scenarios:
      - name: "stage 5 and stage 6 checkpoints arm late-route recovery anchors"
        given: "stage 5 and stage 6 simulations"
        when: "scroll advances through their late-route thresholds"
        then: "each stage arms an explicit checkpoint definition before the boss approach"
      - name: "stage 7 and stage 8 checkpoint definitions remain safe coarse anchors"
        given: "the authored stage 7 and stage 8 definitions"
        when: "their checkpoint lists are inspected"
        then: "each stage exposes a coarse checkpoint outside staggered-wave restore windows"
  - id: HID-301
    description: "Stages 5 through 8 express their stable special routes through data, including timed hidden conditions and multi-reward payloads."
    priority: high
    scenarios:
      - name: "stage 6 extend route only rewards after the red crystal reaches its authored escape state"
        given: "the stage 6 red crystal route"
        when: "the crystal is destroyed after entering the authored escape state"
        then: "an extend reward appears exactly once"
      - name: "stage 8 pre-boss hidden route emits Miclus and medal rewards from one trigger"
        given: "the stage 8 pre-boss hidden route"
        when: "the authored trigger condition becomes true"
        then: "one hidden trigger emits the Miclus reward and the medal line without simulation-side special casing"
      - name: "late hidden routes expire when the boss encounter starts"
        given: "an optional pre-boss hidden route that remains untriggered when the boss starts"
        when: "the player fulfills the hidden condition during the boss encounter"
        then: "the hidden reveal or reward does not fire"
  - id: BOS-301
    description: "Stages 5 through 8 culminate in authored boss encounters with named phase ladders and multipart structure where the route needs it."
    priority: high
    scenarios:
      - name: "Black Bird advances through its three-form ladder"
        given: "the stage 5 boss encounter"
        when: "its health crosses the authored thresholds"
        then: "the boss phase ladder follows opening, blue form, and red form"
      - name: "Graphite and Huge Satellite expose authored multipart or named phase ladders"
        given: "the stage 6 and stage 7 boss encounters"
        when: "their authored data is inspected and exercised"
        then: "each boss follows its named phase ladder without stage-specific runtime logic"
      - name: "Mother Haven advances through the authored final-boss ladder before loop carryover"
        given: "the stage 8 boss encounter"
        when: "its health crosses the authored thresholds"
        then: "the boss advances through shell, siege, and core phases before stage clear"
  - id: LOP-301
    description: "The authored final stage still performs loop carryover after Mother Haven, resetting the stage cursor to stage 1 while preserving session state."
    priority: high
    scenarios:
      - name: "stage 8 clear increments the loop and restarts stage 1"
        given: "a session on stage 8"
        when: "Mother Haven is defeated"
        then: "the loop index increments and the next stage becomes stage 1"
  - id: AUTH-301
    description: "Stage 5 through 8 authoring extends the existing model with only the minimal new metadata needed for timed hidden routes and multi-reward hidden payloads."
    priority: high
    scenarios:
      - name: "hidden routes can require a defeated enemy to be in an authored state tag"
        given: "a hidden trigger for the stage 6 red crystal route"
        when: "the authoring data is inspected"
        then: "the hidden trigger can express an enemy-destroyed-in-state condition and the enemy data exposes the authored state transition"
      - name: "one hidden trigger can emit multiple pickups"
        given: "a hidden trigger for the stage 8 pre-boss Miclus line"
        when: "the authoring data is inspected"
        then: "the trigger can emit a Miclus reward plus authored medal pickups from the data layer"
      - name: "optional hidden routes can explicitly expire once the boss starts"
        given: "a pre-boss hidden route on stage 7 or stage 8"
        when: "the authoring data is inspected"
        then: "the hidden trigger can declare that it expires on boss start without introducing simulation-side stage branches"
  - id: COOP-201
    description: "A co-op session keeps encounter progression shared even when one player exhausts stock and enters an independent continue state."
    priority: high
    scenarios:
      - name: "one player entering continue does not reset the shared encounter"
        given: "a co-op session with live enemies on screen"
        when: "player one exhausts reserve stock while player two remains alive"
        then: "player one enters continue-pending, player two keeps playing, and the shared encounter state is preserved"
  - id: COOP-202
    description: "Continue windows are tracked per player and can resolve independently into a resumed session or a full session game over."
    priority: high
    scenarios:
      - name: "accepting continue restores one pending player"
        given: "a player in continue-pending with continue enabled"
        when: "that player accepts continue"
        then: "the player re-enters at a checkpoint-safe position with starting stock and a continue-accepted event is emitted"
      - name: "ignoring continue for both players ends the session"
        given: "both co-op players are in continue-pending"
        when: "their continue countdowns expire without acceptance"
        then: "both players become game-over and the session enters session-game-over"
  - id: COOP-203
    description: "The simulation exposes a join or rejoin path for player two without pushing lifecycle rules into the UI layer."
    priority: medium
    scenarios:
      - name: "player two can rejoin from a checkpoint-safe position"
        given: "player two has already reached game-over in a co-op session"
        when: "the simulation receives a joinPlayer request for player two"
        then: "player two re-enters from a checkpoint-safe position and gameplay continues without rewinding the shared encounter"
  - id: COOP-204
    description: "Enemy defeats and pickup collection are attributed to the correct local player for score, extends, weapons, bombs, and rewards."
    priority: high
    scenarios:
      - name: "enemy defeat credit is applied to the source player"
        given: "a live enemy in a co-op session"
        when: "the simulation defeats that enemy with player two as the source"
        then: "player two receives the score credit while player one remains unchanged"
      - name: "pickup collection affects only the collecting player"
        given: "a live pickup in a co-op session"
        when: "player one collects the pickup"
        then: "only player one receives the pickup effect and the pickup-collected event identifies player one as the collector"
  - id: CAB-201
    description: "Cabinet rules define starting stock, extend thresholds, and continue policy for the session without forking simulation ownership."
    priority: high
    scenarios:
      - name: "cabinet rules seed starting stock and extend thresholds"
        given: "easy and hard sessions"
        when: "their initial simulation state is inspected"
        then: "starting lives, starting bombs, extend thresholds, and continue policy come from cabinet rules"
  - id: CAB-202
    description: "Hard-only content gates, reward overrides, and encounter tuning remain data-driven while cabinet rules supply session-level policy."
    priority: high
    scenarios:
      - name: "hard-only authoring data remains intact beside cabinet rules"
        given: "the authored stage data for cabinet-gated content"
        when: "hard-only waves and reward overrides are inspected"
        then: "the authoring layer still carries those cabinet gates rather than moving them into simulation branches"
  - id: UIF-001
    description: "The browser shell exposes an app-layer flow controller for title, session selection, gameplay, continue, game-over, ending, and loop transition without creating a second gameplay authority."
    priority: high
    scenarios:
      - name: "title advances through mode and cabinet selection into gameplay"
        given: "a new browser-shell flow controller"
        when: "the user starts from title, picks 1P or 2P, and confirms easy or hard"
        then: "the shell enters gameplay with a derived session config while simulation remains the gameplay owner"
      - name: "continue and session game over follow simulation flow"
        given: "an active gameplay session in the browser shell"
        when: "simulation reports continue or session-game-over flow"
        then: "the shell overlays the corresponding continue or game-over state without inventing new gameplay rules"
      - name: "stage clear can sequence ending and loop transition overlays"
        given: "the browser shell receives authored stage-cleared and loop-advanced events"
        when: "the final-stage clear resolves"
        then: "the shell can enter ending and then loop-transition before returning to gameplay"
  - id: HUD-001
    description: "The browser shell derives a HUD projection from simulation state for 1P/2P score, stock, stage, boss, and continue overlays."
    priority: high
    scenarios:
      - name: "hud projection mirrors per-player score and stock"
        given: "a simulation snapshot with two players"
