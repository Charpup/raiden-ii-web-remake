        then: "the snapshot includes the current asset-load state and related observability details"
  - id: RNT-202R
    description: "Stage 1 startup hard-fails into an asset-error shell state when the required replacement asset set is missing or incomplete."
    priority: high
    scenarios:
      - name: "missing replacement asset set does not start gameplay"
