        when: "the player returns to title"
        then: "the shell leaves asset-error without retaining failed gameplay startup state"
  - id: REL-401
    description: "The authored campaign can progress end-to-end from Stage 1 through Stage 8 and loop back to Stage 1 without manual stage reselection."
    priority: high
    scenarios:
      - name: "full authored run advances through every stage in order"
        given: "a fresh single-player session on Stage 1"
        when: "each authored boss is defeated in sequence"
